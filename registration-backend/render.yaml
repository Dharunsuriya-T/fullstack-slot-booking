services:
  - type: web
    name: slot-booking-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: PG_POOL_MAX
        value: 20
      - key: PG_POOL_IDLE_TIMEOUT_MS
        value: 30000
      - key: PG_POOL_CONN_TIMEOUT_MS
        value: 10000
      - key: RATE_LIMIT_PER_MINUTE
        value: 300
